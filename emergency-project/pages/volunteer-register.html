<!DOCTYPE html>
<html>
<head>
<title>Volunteer Registration</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">🚨 EmergencyHelp</div>

<div class="menu">
<a href="../index.html">Home</a>
<a href="login.html">Login</a>
</div>
</div>

<!-- FORM -->
<div class="form-container">
<div class="form-card">

<h2>Join as Volunteer</h2>
<p style="color:#555;">Help people in emergencies near you</p>

<label>Full Name</label>
<input id="vname" placeholder="Enter your name">

<label>Phone Number</label>
<input id="vphone" placeholder="Enter your phone number">

<label>Upload Photo</label>
<input type="file" id="vphoto">

<button onclick="registerVolunteer()">Register</button>

<div id="result"></div>

<p style="margin-top:15px;">
Already registered?
<a href="login.html">Login</a>
</p>

</div>
</div>

<script src="../js/app.js"></script>

</body>
</html>
